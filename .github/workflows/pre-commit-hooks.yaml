name: pre-commit-hooks

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true
      - run: uv sync --all-extras --all-groups --no-extra tachyon
      - run: uv pip install fastapi

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Install native TypeScript build tools
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake gcc-14 g++-14
          version: native-typescript-build-tools-v1
          execute_install_scripts: true

      - name: Configure native TypeScript build tools
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          cmake --version
          gcc-14 --version

      - run: pnpm --dir abxbus-ts install --frozen-lockfile

      - run: uv run prek run --all-files
