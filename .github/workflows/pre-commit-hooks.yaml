name: pre-commit-hooks

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  pre-commit-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true
      - run: uv sync --all-extras --all-groups --no-extra tachyon
      - run: uv pip install fastapi

      - name: Install native TypeScript build tools
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake gcc-14 g++-14
          version: native-typescript-build-tools-v1
          execute_install_scripts: true

      - name: Configure native TypeScript build tools
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          cmake --version
          gcc-14 --version

      - name: Resolve Node runtime with abxpkg
        run: |
          eval "$(tests/resolve_binaries.sh node_binary)"
          printf 'ABXBUS_NODE_BIN=%s\n' "$ABXBUS_NODE_BIN" >> "$GITHUB_ENV"
          printf '%s\n' "$(dirname "$ABXBUS_NODE_BIN")" >> "$GITHUB_PATH"

      - run: uv run abxpkg run --install --binproviders=pnpm pnpm --dir abxbus-ts install --frozen-lockfile

      - run: uv run prek run --all-files
