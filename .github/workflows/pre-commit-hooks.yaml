name: pre-commit-hooks

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit-hooks:
    if: github.event_name != 'push' || github.ref != 'refs/heads/main' || startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true
      - run: uv sync --all-extras --all-groups --no-extra tachyon
      - run: uv pip install fastapi

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - run: pnpm --dir abxbus-ts install --frozen-lockfile

      - run: uv run prek run --all-files
