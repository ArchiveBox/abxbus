name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_sha:
        description: Full commit SHA on main to release
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: pypi
    timeout-minutes: 45
    env:
      RELEASE_SHA: ${{ github.event_name == 'push' && github.sha || inputs.release_sha }}
      RELEASE_BRANCH: main
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_SHA }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Use npm with trusted publishing support
        run: npm install -g npm@12.0.1

      - name: Install native build tools
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: cmake gcc-14 g++-14
          version: native-release-build-tools-v1
          execute_install_scripts: true

      - name: Configure native build tools
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Publish tested commit
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: ./bin/release.sh
