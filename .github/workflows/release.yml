name: Release State

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release-state:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RELEASE_GH_TOKEN || github.token }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Resolve Node runtime with abxpkg
        run: |
          eval "$(tests/resolve_binaries.sh node_binary)"
          printf 'ABXBUS_NODE_BIN=%s\n' "$ABXBUS_NODE_BIN" >> "$GITHUB_ENV"
          printf '%s\n' "$(dirname "$ABXBUS_NODE_BIN")" >> "$GITHUB_PATH"

      - name: Use npm with trusted publishing support
        run: >-
          uv run abxpkg run --install
          --binproviders=env,brew
          --min-version=11.5.1
          --overrides='{"brew":{"install_args":["node"]}}'
          npm --version

      - name: Install native build tools
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake gcc-14 g++-14
          version: native-release-build-tools-v1
          execute_install_scripts: true

      - name: Configure native build tools
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          cmake --version
          gcc-14 --version

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release script
        env:
          DEFAULT_BRANCH: main
          GH_TOKEN: ${{ secrets.RELEASE_GH_TOKEN || github.token }}
        run: ./bin/release.sh
