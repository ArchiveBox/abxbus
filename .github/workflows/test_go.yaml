name: test-go

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find_go_tests:
    runs-on: ubuntu-latest
    outputs:
      GO_TASKS: ${{ steps.lsgrep.outputs.GO_TASKS }}
      # [{ "kind": "test", "name": "eventbus", "package": "./tests", "test_regex": "^(TestEventBus)$" }, ...]
      GO_TEST_TASKS: ${{ steps.lsgrep.outputs.GO_TEST_TASKS }}
      # [{ "kind": "test", "name": "eventbus", ... }, ...]
    steps:
      - uses: actions/checkout@v4
      - id: lsgrep
        run: |
          GO_TEST_TASKS="$(
            find abxbus-go -type f -name '*_test.go' \
              | sort \
              | while read -r test_file; do
                dir="$(dirname "${test_file}")"
                rel_dir="${dir#abxbus-go}"
                if [[ -z "${rel_dir}" ]]; then
                  package="."
                else
                  package=".${rel_dir}"
                fi
                name="$(basename "${test_file}" _test.go)"
                test_regex="$(
                  sed -nE 's/^func (Test[A-Za-z0-9_]*)\(.*$/\1/p' "${test_file}" \
                    | paste -sd '|' -
                )"
                if [[ -z "${test_regex}" ]]; then
                  echo "No Test* functions found in ${test_file}" > /dev/stderr
                  exit 1
                fi
                jq -cn \
                  --arg kind "test" \
                  --arg name "${name}" \
                  --arg package "${package}" \
                  --arg test_regex "^(${test_regex})$" \
                  '{kind: $kind, name: $name, package: $package, test_regex: $test_regex}'
              done \
              | jq -s -c '.'
          )"

          echo "GO_TEST_TASKS=${GO_TEST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "GO_TASKS=${GO_TEST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "$GO_TEST_TASKS"
      - name: Check that at least one test file is found
        env:
          GO_TEST_TASKS: ${{ steps.lsgrep.outputs.GO_TEST_TASKS }}
        run: |
          if [[ -z "${GO_TEST_TASKS}" || "${GO_TEST_TASKS}" == "[]" ]]; then
            echo "Failed to find any *_test.go files in abxbus-go/" > /dev/stderr
            exit 1
          fi

  tests:
    needs:
      - find_go_tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.find_go_tests.outputs.GO_TASKS || '[{"kind":"error","name":"FAILED_TO_DISCOVER_TASKS"}]') }}
        # autodiscovers files in abxbus-go/**/*_test.go
        # - { kind: "test", name: "eventbus", package: "./tests", test_regex: "^(TestEventBus)$" }
        # - { kind: "test", name: "jsonschema", package: "./jsonschema", test_regex: "^(TestInferSchema)$" }
        # ... and more
    name: go-${{ matrix.task.kind }}-${{ matrix.task.name }}
    defaults:
      run:
        working-directory: abxbus-go
    steps:
      - uses: actions/checkout@v4

      - name: Check that the previous step managed to find some tasks for us to run
        run: |
          if [[ "${{ matrix.task.kind }}" == "error" ]]; then
            echo "Failed get list of tasks from find_go_tests job" > /dev/stderr
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          activate-environment: true

      - name: Install native TypeScript build tools
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: cmake gcc-14 g++-14
          version: native-typescript-build-tools-v1
          execute_install_scripts: true

      - name: Configure native TypeScript build tools
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        run: |
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          cmake --version
          gcc-14 --version

      - name: Resolve Go test runtimes with abxpkg
        working-directory: .
        run: |
          sections=(go_binary)
          if [[ "${{ matrix.task.kind }}" == "test" && "${{ matrix.task.name }}" == "cross_runtime_roundtrip" ]]; then
            uv sync --dev --all-extras --no-extra tachyon
            sections=(cross_runtime_binaries)
          fi
          eval "$(tests/resolve_binaries.sh "${sections[@]}")"
          while IFS= read -r name; do
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done < <(compgen -A variable ABXBUS_)
          printf '%s\n' "$(dirname "$ABXBUS_GO_BIN")" >> "$GITHUB_PATH"

      - name: Install TypeScript cross-runtime dependencies
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        working-directory: .
        run: |
          export PATH="$(dirname "$ABXBUS_NODE_BIN"):$PATH"
          uv run abxpkg run --install --binproviders=pnpm pnpm --dir abxbus-ts install --frozen-lockfile

      - name: Run Go test file
        run: |
          "$ABXBUS_GO_BIN" test ${{ matrix.task.package }} -run '${{ matrix.task.test_regex }}' -p 1 -count=1 -timeout=600s
