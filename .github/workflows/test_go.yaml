name: test-go

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  find_go_tests:
    runs-on: ubuntu-24.04
    outputs:
      GO_TASKS: ${{ steps.lsgrep.outputs.GO_TASKS }}
      # [{ "kind": "test", "name": "eventbus", "package": "./tests", "test_regex": "^(TestEventBus)$" }, ...]
      GO_TEST_TASKS: ${{ steps.lsgrep.outputs.GO_TEST_TASKS }}
      # [{ "kind": "test", "name": "eventbus", ... }, ...]
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - id: lsgrep
        run: |
          GO_TEST_TASKS="$(
            find abxbus-go -type f -name '*_test.go' \
              | sort \
              | while read -r test_file; do
                dir="$(dirname "${test_file}")"
                rel_dir="${dir#abxbus-go}"
                if [[ -z "${rel_dir}" ]]; then
                  package="."
                else
                  package=".${rel_dir}"
                fi
                name="$(basename "${test_file}" _test.go)"
                test_regex="$(
                  sed -nE 's/^func (Test[A-Za-z0-9_]*)\(.*$/\1/p' "${test_file}" \
                    | paste -sd '|' -
                )"
                if [[ -z "${test_regex}" ]]; then
                  echo "No Test* functions found in ${test_file}" > /dev/stderr
                  exit 1
                fi
                jq -cn \
                  --arg kind "test" \
                  --arg name "${name}" \
                  --arg package "${package}" \
                  --arg test_regex "^(${test_regex})$" \
                  '{kind: $kind, name: $name, package: $package, test_regex: $test_regex}'
              done \
              | jq -s -c '.'
          )"

          echo "GO_TEST_TASKS=${GO_TEST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "GO_TASKS=${GO_TEST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "$GO_TEST_TASKS"
      - name: Check that at least one test file is found
        env:
          GO_TEST_TASKS: ${{ steps.lsgrep.outputs.GO_TEST_TASKS }}
        run: |
          if [[ -z "${GO_TEST_TASKS}" || "${GO_TEST_TASKS}" == "[]" ]]; then
            echo "Failed to find any *_test.go files in abxbus-go/" > /dev/stderr
            exit 1
          fi

  tests:
    needs:
      - find_go_tests
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.find_go_tests.outputs.GO_TASKS || '[{"kind":"error","name":"FAILED_TO_DISCOVER_TASKS"}]') }}
        # autodiscovers files in abxbus-go/**/*_test.go
        # - { kind: "test", name: "eventbus", package: "./tests", test_regex: "^(TestEventBus)$" }
        # - { kind: "test", name: "jsonschema", package: "./jsonschema", test_regex: "^(TestInferSchema)$" }
        # ... and more
    name: go-${{ matrix.task.kind }}-${{ matrix.task.name }}
    defaults:
      run:
        working-directory: abxbus-go
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Check that the previous step managed to find some tasks for us to run
        run: |
          if [[ "${{ matrix.task.kind }}" == "error" ]]; then
            echo "Failed get list of tasks from find_go_tests job" > /dev/stderr
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: abxbus-go/go.mod
          cache: true
          cache-dependency-path: abxbus-go/go.sum

      - name: Set up Rust for cross-runtime roundtrip tests
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1

      - name: Cache Cargo for cross-runtime roundtrip tests
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: abxbus-rust -> target

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Install Go cross-runtime test dependencies
        if: matrix.task.kind == 'test' && matrix.task.name == 'cross_runtime_roundtrip'
        run: |
          cd ..
          uv sync --dev --all-extras --no-extra tachyon
          pnpm --dir abxbus-ts install --frozen-lockfile

      - name: Run Go test file
        run: go test ${{ matrix.task.package }} -run '${{ matrix.task.test_regex }}' -p 1 -count=1 -timeout=600s
