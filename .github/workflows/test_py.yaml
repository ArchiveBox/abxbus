name: test-py
permissions:
  contents: read

on:
  workflow_call:

jobs:
  discover_python:
    runs-on: ubuntu-24.04
    outputs:
      PYTHON_TASKS: ${{ steps.discover.outputs.PYTHON_TASKS }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: false
      - name: Discover Python tests and examples
        id: discover
        run: |
          uv run --no-project python - <<'PY'
          import json
          import os
          from collections import Counter
          from itertools import cycle
          from pathlib import Path

          targets = (
              {"os": "ubuntu-24.04", "os_name": "linux", "python": "3.11"},
              {"os": "ubuntu-24.04", "os_name": "linux", "python": "3.12"},
              {"os": "ubuntu-24.04", "os_name": "linux", "python": "3.13"},
              {"os": "ubuntu-24.04", "os_name": "linux", "python": "3.14"},
              {"os": "macos-15", "os_name": "macOS", "python": "3.11"},
              {"os": "macos-15", "os_name": "macOS", "python": "3.12"},
              {"os": "macos-15", "os_name": "macOS", "python": "3.13"},
              {"os": "macos-15", "os_name": "macOS", "python": "3.14"},
          )
          discovered = [
              *(("test", path) for path in sorted(Path("tests").glob("test_*.py"))),
              *(("example", path) for path in sorted(Path("examples").glob("*.py"))),
              ("runtime", Path("tests/performance_runtime.py")),
          ]
          if not discovered or not all(path.is_file() for _, path in discovered):
              raise SystemExit("Python test/example discovery produced a missing or empty task list")

          matrix = []
          for (kind, path), target in zip(discovered, cycle(targets), strict=False):
              matrix.append(
                  {
                      "id": f"{kind}-{path.stem}",
                      "kind": kind,
                      "path": str(path),
                      "needs_cross_runtime": path == Path("tests/test_cross_runtime_roundtrip.py"),
                      **target,
                  },
              )

          assigned = Counter((item["kind"], item["path"]) for item in matrix)
          expected = Counter((kind, str(path)) for kind, path in discovered)
          if assigned != expected:
              raise SystemExit("Every Python test, example, and runtime task must be assigned exactly once")
          if {(item["os"], item["python"]) for item in matrix} != {
              (target["os"], target["python"]) for target in targets
          }:
              raise SystemExit("Python tasks must cover every supported OS/Python cell")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"PYTHON_TASKS={json.dumps(matrix, separators=(',', ':'))}\n")
          PY

  docs_py:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml
      - name: Set up Go for documented performance commands
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: abxbus-go/go.mod
          cache: true
          cache-dependency-path: abxbus-go/go.sum
      - name: Set up Rust for documented performance commands
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
      - name: Cache Cargo for documented performance commands
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: abxbus-rust -> target
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - run: uv sync --dev --all-extras --no-extra tachyon
      - run: uv pip install fastapi
      - name: Run documentation code blocks
        run: uv run pytest -vv --tb=long README.md abxbus-go/README.md abxbus-ts/README.md AGENTS.md skills docs

  tests:
    needs: discover_python
    runs-on: ${{ matrix.task.os }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.discover_python.outputs.PYTHON_TASKS) }}
    name: ${{ matrix.task.path }} / ${{ matrix.task.os_name }} / Python ${{ matrix.task.python }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.task.python }}

      - name: Set up Go for cross-runtime tests
        if: matrix.task.needs_cross_runtime
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: abxbus-go/go.mod
          cache: true
          cache-dependency-path: abxbus-go/go.sum

      - name: Set up Rust for cross-runtime tests
        if: matrix.task.needs_cross_runtime
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1

      - name: Cache Cargo for cross-runtime tests
        if: matrix.task.needs_cross_runtime
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: abxbus-rust -> target

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        if: matrix.task.needs_cross_runtime
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        if: matrix.task.needs_cross_runtime
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Install bridge service binaries
        if: matrix.task.needs_cross_runtime && runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: redis-server nats-server postgresql sqlite3 gcc-14 g++-14
          version: bridge-service-binaries-gcc14-v1
          execute_install_scripts: true

      - name: Install bridge service binaries
        if: matrix.task.needs_cross_runtime && runner.os == 'macOS'
        run: brew install redis nats-server postgresql@17 sqlite gcc@14

      - name: Configure bridge service binaries
        if: matrix.task.needs_cross_runtime
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            PG_BINDIR="$(brew --prefix postgresql@17)/bin"
          else
            PG_INITDB_PATH="$(find /usr/lib/postgresql -type f -name initdb | head -n 1)"
            PG_BINDIR="$(dirname "${PG_INITDB_PATH}")"
          fi
          if [[ -z "${PG_BINDIR}" || ! -x "${PG_BINDIR}/initdb" || ! -x "${PG_BINDIR}/postgres" ]]; then
            echo "Failed to locate PostgreSQL binaries (initdb/postgres)" > /dev/stderr
            exit 1
          fi
          echo "${PG_BINDIR}" >> "${GITHUB_PATH}"
          export PATH="${PG_BINDIR}:${PATH}"

          redis-server --version
          nats-server --version
          initdb --version
          postgres --version
          sqlite3 --version
          gcc-14 --version
          g++-14 --version

      - run: uv sync --dev --all-extras --no-extra tachyon

      - name: Install optional Tachyon peer for bridge tests
        if: matrix.task.needs_cross_runtime
        run: CC=gcc-14 CXX=g++-14 uv pip install tachyon-ipc

      - name: Build TypeScript ESM bundle for cross-runtime roundtrip tests
        if: matrix.task.needs_cross_runtime
        run: |
          pnpm --dir abxbus-ts install --frozen-lockfile
          pnpm --dir abxbus-ts run build

      - name: Verify bridge optional Python deps
        if: matrix.task.needs_cross_runtime
        run: |
          uv run python - <<'PY'
          import importlib
          modules = ['asyncpg', 'redis', 'nats', 'tachyon']
          for module in modules:
              importlib.import_module(module)
          print('optional bridge deps import OK')
          PY

      - name: Run discovered test with coverage
        if: matrix.task.kind == 'test'
        run: uv run coverage run --parallel-mode --source=abxbus -m pytest "${{ matrix.task.path }}"

      - name: Run discovered example with coverage
        if: matrix.task.kind == 'example'
        run: uv run coverage run --parallel-mode --source=abxbus "${{ matrix.task.path }}"

      - name: Run discovered performance runtime with coverage
        if: matrix.task.kind == 'runtime'
        run: |
          set -o pipefail
          uv run coverage run --parallel-mode --source=abxbus "${{ matrix.task.path }}" | tee python_perf.log
          cat python_perf.log >> "$GITHUB_STEP_SUMMARY"

      - name: Check coverage files
        if: always()
        run: |
          shopt -s nullglob
          coverage_files=(.coverage*)
          [[ "${#coverage_files[@]}" -gt 0 ]]
          for coverage_file in "${coverage_files[@]}"; do
            echo "Found coverage file ($coverage_file), size: $(stat -f%z "$coverage_file" 2>/dev/null || stat -c%s "$coverage_file") bytes"
          done

      - name: Upload coverage data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.task.id }}-${{ matrix.task.os_name }}-py${{ matrix.task.python }}
          path: |
            .coverage*
            pyproject.toml
          retention-days: 7
          include-hidden-files: true
        if: always()

  coverage:
    needs: tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - run: uv sync --dev --all-extras --no-extra tachyon

      - name: Download all coverage data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*
          path: coverage-data/

      - name: Combine coverage data
        run: |
          counter=1
          while IFS= read -r coverage_file; do
            cp "$coverage_file" ".coverage.$counter"
            counter=$((counter + 1))
          done < <(find coverage-data -name '.coverage*' -type f -print)
          [[ "$counter" -gt 1 ]]

      - name: Combine coverage & fail if it's <50%
        run: |
          OMIT='abxbus/bridge*.py'

          uv run coverage combine
          uv run coverage html --skip-covered --skip-empty --omit="$OMIT"
          uv run coverage xml --omit="$OMIT"

          {
            echo "### Python combined coverage"
            echo ""
            uv run coverage report --omit="$OMIT" --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

          uv run coverage report --omit="$OMIT" --fail-under=50

      - name: Upload combined coverage report
        id: upload_py_coverage_report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            pyproject.toml
          retention-days: 7

      - name: Append Python coverage artifact link
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Download Python HTML coverage artifact (coverage-report)](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload_py_coverage_report.outputs.artifact-id }})" >> "$GITHUB_STEP_SUMMARY"
