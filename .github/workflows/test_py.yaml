name: test-py
permissions:
  contents: read

on:
  workflow_call:

jobs:
  docs_py:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml
      - name: Set up Go for documented performance commands
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: abxbus-go/go.mod
          cache: true
          cache-dependency-path: abxbus-go/go.sum
      - name: Set up Rust for documented performance commands
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: 1.97.1
      - name: Cache Cargo for documented performance commands
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: abxbus-rust -> target
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - run: uv sync --dev --all-extras --no-extra tachyon
      - run: uv pip install fastapi
      - name: Run documentation code blocks
        run: uv run pytest -vv --tb=long README.md abxbus-go/README.md abxbus-ts/README.md AGENTS.md skills docs

  tests:
    needs: docs_py
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-24.04
            os_name: linux
            python: "3.11"
          - os: ubuntu-24.04
            os_name: linux
            python: "3.12"
          - os: ubuntu-24.04
            os_name: linux
            python: "3.13"
          - os: ubuntu-24.04
            os_name: linux
            python: "3.14"
          - os: macos-15
            os_name: macOS
            python: "3.11"
          - os: macos-15
            os_name: macOS
            python: "3.12"
          - os: macos-15
            os_name: macOS
            python: "3.13"
          - os: macos-15
            os_name: macOS
            python: "3.14"
    name: ${{ matrix.target.os_name }}-py${{ matrix.target.python }}-all-tests-and-examples
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.target.python }}

      - name: Set up Go for cross-runtime tests
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: abxbus-go/go.mod
          cache: true
          cache-dependency-path: abxbus-go/go.sum

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Install bridge service binaries
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # v1.6.3
        with:
          packages: redis-server nats-server postgresql sqlite3 gcc-14 g++-14
          version: bridge-service-binaries-gcc14-v1
          execute_install_scripts: true

      - name: Install bridge service binaries
        if: runner.os == 'macOS'
        run: brew install redis nats-server postgresql@17 sqlite gcc@14

      - name: Configure bridge service binaries
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            PG_BINDIR="$(brew --prefix postgresql@17)/bin"
          else
            PG_INITDB_PATH="$(find /usr/lib/postgresql -type f -name initdb | head -n 1)"
            PG_BINDIR="$(dirname "${PG_INITDB_PATH}")"
          fi
          if [[ -z "${PG_BINDIR}" || ! -x "${PG_BINDIR}/initdb" || ! -x "${PG_BINDIR}/postgres" ]]; then
            echo "Failed to locate PostgreSQL binaries (initdb/postgres)" > /dev/stderr
            exit 1
          fi
          echo "${PG_BINDIR}" >> "${GITHUB_PATH}"
          export PATH="${PG_BINDIR}:${PATH}"

          redis-server --version
          nats-server --version
          initdb --version
          postgres --version
          sqlite3 --version
          gcc-14 --version
          g++-14 --version

      - run: uv sync --dev --all-extras --no-extra tachyon

      - name: Install optional Tachyon peer for bridge tests
        run: CC=gcc-14 CXX=g++-14 uv pip install tachyon-ipc

      - name: Build TypeScript ESM bundle for cross-runtime roundtrip tests
        run: |
          pnpm --dir abxbus-ts install --frozen-lockfile
          pnpm --dir abxbus-ts run build

      - name: Verify bridge optional Python deps
        run: |
          uv run python - <<'PY'
          import importlib
          modules = ['asyncpg', 'redis', 'nats', 'tachyon']
          for module in modules:
              importlib.import_module(module)
          print('optional bridge deps import OK')
          PY

      - name: Run every test and example with coverage
        run: |
          tests=()
          while IFS= read -r test_file; do
            tests+=("$test_file")
          done < <(find tests -maxdepth 1 -type f -name 'test_*.py' ! -name 'test_eventbus_performance.py' | sort)
          examples=()
          while IFS= read -r example_file; do
            examples+=("$example_file")
          done < <(find examples -maxdepth 1 -type f -name '*.py' | sort)
          [[ "${#tests[@]}" -gt 0 ]]
          [[ "${#examples[@]}" -gt 0 ]]
          uv run coverage run --parallel-mode --source=abxbus -m pytest "${tests[@]}"
          for example in "${examples[@]}"; do
            uv run coverage run --parallel-mode --source=abxbus "$example"
          done

      - name: Check coverage files
        if: always()
        run: |
          shopt -s nullglob
          coverage_files=(.coverage*)
          [[ "${#coverage_files[@]}" -gt 0 ]]
          for coverage_file in "${coverage_files[@]}"; do
            echo "Found coverage file ($coverage_file), size: $(stat -f%z "$coverage_file" 2>/dev/null || stat -c%s "$coverage_file") bytes"
          done

      - name: Upload coverage data
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.target.os_name }}-py${{ matrix.target.python }}
          path: |
            .coverage*
            pyproject.toml
          retention-days: 7
          include-hidden-files: true
        if: always()

  coverage:
    needs: tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - run: uv sync --dev --all-extras --no-extra tachyon

      - name: Download all coverage data
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: coverage-*
          path: coverage-data/

      - name: Combine coverage data
        run: |
          counter=1
          while IFS= read -r coverage_file; do
            cp "$coverage_file" ".coverage.$counter"
            counter=$((counter + 1))
          done < <(find coverage-data -name '.coverage*' -type f -print)
          [[ "$counter" -gt 1 ]]

      - name: Combine coverage & fail if it's <50%
        run: |
          OMIT='abxbus/bridge*.py'

          uv run coverage combine
          uv run coverage html --skip-covered --skip-empty --omit="$OMIT"
          uv run coverage xml --omit="$OMIT"

          {
            echo "### Python combined coverage"
            echo ""
            uv run coverage report --omit="$OMIT" --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

          uv run coverage report --omit="$OMIT" --fail-under=50

      - name: Upload combined coverage report
        id: upload_py_coverage_report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
            pyproject.toml
          retention-days: 7

      - name: Append Python coverage artifact link
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Download Python HTML coverage artifact (coverage-report)](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload_py_coverage_report.outputs.artifact-id }})" >> "$GITHUB_STEP_SUMMARY"

  perf:
    runs-on: ubuntu-24.04
    outputs:
      perf_stats: ${{ steps.export_perf.outputs.perf_stats }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.10.6"
          enable-cache: true
          activate-environment: true

      - run: uv sync --dev --all-extras --no-extra tachyon
      - run: uv run pytest tests/test_eventbus_performance.py
      - name: Run Python runtime perf
        run: uv run python tests/performance_runtime.py | tee python_perf.log
      - name: Export Python perf stats
        id: export_perf
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          text = Path("python_perf.log").read_text(encoding="utf-8", errors="replace")
          lines = [line.strip() for line in text.splitlines()]
          stat_lines = [line for line in lines if re.match(r"^\[python\]\s.+:\s.*latency=", line)]

          if not stat_lines:
              # Fallback: parse final JSON payload if present.
              for index, char in enumerate(text):
                  if char != "[":
                      continue
                  try:
                      payload = json.loads(text[index:])
                  except Exception:
                      continue
                  if not isinstance(payload, list):
                      continue
                  compact = []
                  for item in payload:
                      if not isinstance(item, dict):
                          continue
                      scenario = str(item.get("scenario_id", "unknown"))
                      latency = item.get("ms_per_event")
                      unit = str(item.get("ms_per_event_unit", "event"))
                      throughput = item.get("throughput")
                      peak_rss = item.get("peak_rss_kb_per_event")
                      parts = [f"{scenario}:"]
                      if isinstance(latency, (int, float)):
                          parts.append(f"latency={float(latency):.3f}ms/{unit}")
                      if isinstance(throughput, (int, float)):
                          parts.append(f"throughput={int(throughput)}/s")
                      if isinstance(peak_rss, (int, float)):
                          parts.append(f"peak_rss={float(peak_rss):.3f}kb/event")
                      compact.append(" ".join(parts))
                  if compact:
                      stat_lines = compact
                  break

          if not stat_lines:
              stat_lines = ["unable to parse python perf stats; see job log"]

          stats = "\n".join(stat_lines)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write("perf_stats<<EOF\n")
              fh.write(stats + "\n")
              fh.write("EOF\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("### Python Perf Stats\n\n```\n")
              fh.write(stats + "\n")
              fh.write("```\n")
          PY
