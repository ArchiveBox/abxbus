name: test-rust

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  find_rust_tests:
    runs-on: ubuntu-latest
    outputs:
      RUST_TASKS: ${{ steps.lsgrep.outputs.RUST_TASKS }}
      # [{ "kind": "lib" | "test" | "bin", "name": "test_eventbus" }, ...]
      RUST_TEST_TASKS: ${{ steps.lsgrep.outputs.RUST_TEST_TASKS }}
      # [{ "kind": "test", "name": "test_eventbus" }, ...]
    steps:
      - uses: actions/checkout@v4
      - id: lsgrep
        run: |
          RUST_LIB_TASKS="$(jq -cn '[{kind: "lib", name: "lib"}]')"
          RUST_TEST_TASKS="$(
            find abxbus-rust/tests -maxdepth 1 -type f -name '*.rs' \
              | sort \
              | sed 's|^abxbus-rust/tests/||' \
              | sed 's|\.rs$||' \
              | jq -R -s -c 'split("\n")[:-1] | map({kind: "test", name: .})'
          )"
          RUST_BIN_TASKS="$(
            (
              if [[ -d abxbus-rust/src/bin ]]; then
                find abxbus-rust/src/bin -maxdepth 1 -type f -name '*.rs' | sort
              fi
            ) \
              | sed 's|^abxbus-rust/src/bin/||' \
              | sed 's|\.rs$||' \
              | jq -R -s -c 'split("\n")[:-1] | map({kind: "bin", name: .})'
          )"
          RUST_TASKS="$(jq -cn --argjson lib "$RUST_LIB_TASKS" --argjson tests "$RUST_TEST_TASKS" --argjson bins "$RUST_BIN_TASKS" '$lib + $tests + $bins')"

          echo "RUST_TEST_TASKS=${RUST_TEST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "RUST_TASKS=${RUST_TASKS}" >> "$GITHUB_OUTPUT"
          echo "$RUST_TASKS"
      - name: Check that at least one test file is found
        run: |
          if [[ -z "${{ steps.lsgrep.outputs.RUST_TEST_TASKS }}" || "${{ steps.lsgrep.outputs.RUST_TEST_TASKS }}" == "[]" ]]; then
            echo "Failed to find any *.rs files in abxbus-rust/tests/ folder!" > /dev/stderr
            exit 1
          fi

  tests:
    needs:
      - find_rust_tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(needs.find_rust_tests.outputs.RUST_TASKS || '[{"kind":"error","name":"FAILED_TO_DISCOVER_TASKS"}]') }}
        # autodiscovers files in abxbus-rust/tests/*.rs and abxbus-rust/src/bin/*.rs
        # - { kind: "lib", name: "lib" }
        # - { kind: "test", name: "test_eventbus" }
        # - { kind: "bin", name: "abxbus-rust-roundtrip" }
        # ... and more
    name: rust-${{ matrix.task.kind }}-${{ matrix.task.name }}
    timeout-minutes: 10
    defaults:
      run:
        working-directory: abxbus-rust
    steps:
      - uses: actions/checkout@v4

      - name: Check that the previous step managed to find some tasks for us to run
        run: |
          if [[ "${{ matrix.task.kind }}" == "error" ]]; then
            echo "Failed get list of tasks from find_rust_tests job" > /dev/stderr
            exit 1
          fi

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Resolve Rust test runtimes with abxpkg
        working-directory: .
        run: |
          sections=(rust_binary)
          if [[ "${{ matrix.task.kind }}" == "test" && "${{ matrix.task.name }}" == "test_cross_runtime_roundtrip" ]]; then
            sections+=(go_binary)
          fi
          eval "$(tests/resolve_binaries.sh "${sections[@]}")"
          while IFS= read -r name; do
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done < <(compgen -A variable ABXBUS_)
          printf '%s\n' "$(dirname "$ABXBUS_CARGO_BIN")" >> "$GITHUB_PATH"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: abxbus-rust -> target

      - name: Run Rust library tests
        if: matrix.task.kind == 'lib'
        run: |
          "$ABXBUS_CARGO_BIN" test --locked --all-features --lib -- --nocapture

      - name: Run Rust integration test
        if: matrix.task.kind == 'test'
        run: |
          "$ABXBUS_CARGO_BIN" test --locked --all-features --test ${{ matrix.task.name }} -- --nocapture

      - name: Run Rust binary tests
        if: matrix.task.kind == 'bin'
        run: |
          "$ABXBUS_CARGO_BIN" test --locked --all-features --bin ${{ matrix.task.name }} -- --nocapture
