name: test-rust-go

on:
  push:
    branches:
      - main
      - stable
      - 'releases/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: ${{ matrix.runtime }} full suite
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: rust
            working-directory: abxbus-rust
            test-command: cargo test --locked --all-targets --all-features
          - runtime: go
            working-directory: abxbus-go
            test-command: go test ./... -p 1 -count=1 -timeout=600s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        if: matrix.runtime == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: abxbus-go/go.mod
          cache-dependency-path: abxbus-go/go.sum

      - uses: astral-sh/setup-uv@v6
        if: matrix.runtime == 'go'
        with:
          enable-cache: true
          activate-environment: true

      - uses: pnpm/action-setup@v4
        if: matrix.runtime == 'go'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: matrix.runtime == 'go'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: abxbus-ts/pnpm-lock.yaml

      - name: Install native TypeScript build tools
        if: matrix.runtime == 'go'
        run: |
          wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/kitware-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ noble main" \
            | sudo tee /etc/apt/sources.list.d/kitware.list
          sudo apt-get update
          sudo apt-get install -y cmake gcc-14 g++-14
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
          cmake --version
          gcc-14 --version

      - name: Install Go cross-runtime test dependencies
        if: matrix.runtime == 'go'
        run: |
          uv sync --dev --all-extras --no-extra tachyon
          pnpm --dir abxbus-ts install --frozen-lockfile

      - name: Run ${{ matrix.runtime }} tests
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.test-command }}
